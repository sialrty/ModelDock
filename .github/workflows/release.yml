name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ${{ matrix.os }}
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
          - os: windows-11-arm
            arch: arm64
          - os: ubuntu-22.04
          - os: ubuntu-22.04-arm
            arch: arm64
          - os: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Windows ARM64 target
        if: runner.os == 'Windows' && matrix.arch == 'arm64'
        shell: pwsh
        run: rustup target add aarch64-pc-windows-msvc

      - name: Add macOS targets
        if: runner.os == 'macOS'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          # Core build tools and pkg-config
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            patchelf \
            libssl-dev \
            rpm \
            flatpak \
            flatpak-builder \
            elfutils \
            xdg-utils
          # GTK/GLib stack for gdk-3.0, glib-2.0, gio-2.0
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev
          # WebKit2GTK (version differs across Ubuntu images; try 4.1 then 4.0)
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          # libsoup also changed major version; prefer 3.0 with fallback to 2.4
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Setup pnpm
        if: runner.os != 'Windows' || matrix.arch != 'arm64'
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Setup pnpm (Windows ARM64)
        if: runner.os == 'Windows' && matrix.arch == 'arm64'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          corepack enable
          corepack prepare pnpm@10.12.3 --activate
          node --version
          pnpm --version

      - name: Get pnpm store directory
        if: runner.os != 'Windows' || matrix.arch != 'arm64'
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        if: runner.os != 'Windows' || matrix.arch != 'arm64'
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-

      - name: Setup LLVM for Windows ARM64
        if: runner.os == 'Windows' && matrix.arch == 'arm64'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $llvmRoot = 'C:\Program Files\LLVM'
          if (-not (Test-Path $llvmRoot)) {
            throw "LLVM not found at $llvmRoot"
          }
          $llvmBin = Join-Path $llvmRoot 'bin'
          "LIBCLANG_PATH=$llvmBin" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CLANG_PATH=$(Join-Path $llvmBin 'clang.exe')" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          $llvmBin | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri App (macOS)
        if: runner.os == 'macOS'
        shell: bash
        timeout-minutes: 60
        run: pnpm tauri build --target universal-apple-darwin --bundles app,dmg

      - name: Build Tauri App (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_RELEASE_ARCH: ${{ matrix.arch || 'x86_64' }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:WINDOWS_RELEASE_ARCH -eq 'arm64') {
            pnpm tauri build --target aarch64-pc-windows-msvc --bundles msi
          } else {
            pnpm tauri build
          }

      - name: Build Tauri App (Linux)
        if: runner.os == 'Linux'
        run: pnpm tauri build --bundles appimage,deb,rpm

      - name: Prepare macOS Assets
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME}"  # e.g., v3.5.0

          # Locate bundle artifacts
          APP_PATH=""
          for path in \
            "src-tauri/target/universal-apple-darwin/release/bundle/macos" \
            "src-tauri/target/aarch64-apple-darwin/release/bundle/macos" \
            "src-tauri/target/x86_64-apple-darwin/release/bundle/macos" \
            "src-tauri/target/release/bundle/macos"; do
            if [ -d "$path" ]; then
              [ -z "$APP_PATH" ] && APP_PATH=$(find "$path" -maxdepth 1 -name "*.app" -type d | head -1 || true)
            fi
          done

          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app found" >&2
            exit 1
          fi

          # Collect .app as zip
          NEW_ZIP="ModelDock-${VERSION}-macOS.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "release-assets/$NEW_ZIP"
          echo "macOS zip ready: $NEW_ZIP"

          DMG_PATH=$(find src-tauri/target -path "*/release/bundle/dmg/*.dmg" -type f | head -1 || true)
          if [ -z "$DMG_PATH" ]; then
            echo "No .dmg found" >&2
            exit 1
          fi
          cp "$DMG_PATH" "release-assets/ModelDock-${VERSION}-macOS.dmg"
          echo "macOS DMG ready"

      - name: Prepare Windows Assets
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_RELEASE_ARCH: ${{ matrix.arch || 'x86_64' }}
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $VERSION = $env:GITHUB_REF_NAME  # e.g., v3.5.0
          $isArm64 = $env:WINDOWS_RELEASE_ARCH -eq 'arm64'
          $targetRoot = if ($isArm64) { 'src-tauri/target/aarch64-pc-windows-msvc/release' } else { 'src-tauri/target/release' }
          $assetSuffix = if ($isArm64) { '-arm64' } else { '' }

          # MSI installer
          $msi = Get-ChildItem -Path (Join-Path $targetRoot 'bundle/msi') -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $msi) {
            # 兜底：全局搜索 .msi
            $msi = Get-ChildItem -Path (Join-Path $targetRoot 'bundle') -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($null -ne $msi) {
            $dest = "ModelDock-$VERSION-Windows$assetSuffix.msi"
            Copy-Item $msi.FullName (Join-Path release-assets $dest)
            Write-Host "Installer copied: $dest"
          } elseif ($isArm64) {
            throw 'No Windows ARM64 MSI installer found'
          } else {
            Write-Warning 'No Windows MSI installer found'
          }

          # Portable build
          $exeCandidates = if ($isArm64) {
            @('src-tauri/target/aarch64-pc-windows-msvc/release/modeldock.exe')
          } else {
            @(
              'src-tauri/target/release/modeldock.exe',
              'src-tauri/target/x86_64-pc-windows-msvc/release/modeldock.exe'
            )
          }
          $exePath = $exeCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($null -ne $exePath) {
            $portableDir = 'release-assets/ModelDock-Portable'
            New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
            Copy-Item $exePath $portableDir
            $portableIniPath = Join-Path $portableDir 'portable.ini'
            $portableContent = if ($isArm64) {
              @(
                '# ModelDock portable ARM64 build marker',
                'portable=true',
                'arch=arm64'
              )
            } else {
              @(
                '# ModelDock portable build marker',
                'portable=true'
              )
            }
            $portableContent | Set-Content -Path $portableIniPath -Encoding UTF8
            $portableZip = "release-assets/ModelDock-$VERSION-Windows$assetSuffix-Portable.zip"
            Compress-Archive -Path "$portableDir/*" -DestinationPath $portableZip -Force
            Remove-Item -Recurse -Force $portableDir
            Write-Host "Windows portable zip created: ModelDock-$VERSION-Windows$assetSuffix-Portable.zip"
          } elseif ($isArm64) {
            throw 'Portable ARM64 exe not found'
          } else {
            Write-Warning 'Portable exe not found'
          }

      - name: Prepare Linux Assets
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME}"  # e.g., v3.5.0
          ARCH="${{ matrix.arch || 'x86_64' }}"
          # AppImage
          APPIMAGE=$(find src-tauri/target/release/bundle -name "*.AppImage" | head -1 || true)
          if [ -n "$APPIMAGE" ]; then
            NEW_APPIMAGE="ModelDock-${VERSION}-Linux-${ARCH}.AppImage"
            cp "$APPIMAGE" "release-assets/$NEW_APPIMAGE"
            echo "AppImage copied: $NEW_APPIMAGE"
          else
            echo "No AppImage found under target/release/bundle" >&2
          fi
          # Debian package
          DEB=$(find src-tauri/target/release/bundle -name "*.deb" | head -1 || true)
          if [ -n "$DEB" ]; then
            cp "$DEB" "release-assets/ModelDock-${VERSION}-Linux-${ARCH}.deb"
            echo "Deb package copied: ModelDock-${VERSION}-Linux-${ARCH}.deb"
          else
            echo "No .deb found (optional)"
          fi
          # RPM package
          RPM=$(find src-tauri/target/release/bundle -name "*.rpm" | head -1 || true)
          if [ -n "$RPM" ]; then
            cp "$RPM" "release-assets/ModelDock-${VERSION}-Linux-${ARCH}.rpm"
            echo "RPM package copied: ModelDock-${VERSION}-Linux-${ARCH}.rpm"
          else
            echo "No .rpm found (optional)"
          fi

      - name: List prepared assets
        shell: bash
        run: |
          ls -la release-assets || true

      - name: Upload release artifacts to workflow
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ runner.os }}-${{ matrix.arch || runner.arch }}
          path: release-assets/*
          if-no-files-found: error

      - name: List generated bundles (debug)
        if: always()
        shell: bash
        run: |
          echo "Listing bundles in src-tauri/target..."
          find src-tauri/target -maxdepth 4 -type f -name "*.*" 2>/dev/null || true

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: release
    permissions:
      contents: write
    steps:
      - name: Download built release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: List downloaded release artifacts
        shell: bash
        run: |
          set -euo pipefail
          ls -la release-assets

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ModelDock ${{ github.ref_name }}
          prerelease: false
          overwrite_files: true
          body: |
            ## ModelDock ${{ github.ref_name }}

            跨平台 AI 编程工具供应商配置管理器。

            **唯一赞助商：[FlareDeep](https://flaredeep.cn)**

            ### 下载

            - **macOS**: `ModelDock-${{ github.ref_name }}-macOS.dmg`（推荐）或 `ModelDock-${{ github.ref_name }}-macOS.zip`（解压即用）
            - **Windows (x86_64)**: `ModelDock-${{ github.ref_name }}-Windows.msi`（安装版）或 `ModelDock-${{ github.ref_name }}-Windows-Portable.zip`（绿色版）
            - **Windows (ARM64)**: `ModelDock-${{ github.ref_name }}-Windows-arm64.msi`（安装版）或 `ModelDock-${{ github.ref_name }}-Windows-arm64-Portable.zip`（绿色版）
            - **Linux (x86_64)**: `ModelDock-${{ github.ref_name }}-Linux-x86_64.AppImage` / `.deb` / `.rpm`
            - **Linux (ARM64)**: `ModelDock-${{ github.ref_name }}-Linux-arm64.AppImage` / `.deb` / `.rpm`

            ---
            macOS 构建未使用 Apple Developer ID 签名；首次打开时请在 Finder 中右键应用并选择“打开”。
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
